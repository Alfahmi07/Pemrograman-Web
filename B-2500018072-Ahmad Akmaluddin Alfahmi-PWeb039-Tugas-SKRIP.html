<!DOCTYPE html>
<html>
<head>
    <title>Format Warna, Ukuran, dan Font</title>
</head>
<body>

    <font face="Times New Roman">Pweb pelajaran yang menyenangkan</font><br>
    <font face="Arial">Pweb pelajaran yang menyenangkan</font><br>
    <font face="Courier New">Pweb pelajaran yang menyenangkan</font><br>
    <font face="Verdana">Pweb pelajaran yang menyenangkan</font><br>

    <br><br>
    
    Ukuran<br>

    <font size="1">satu</font><br>
    <font size="2">dua</font><br>
    <font size="3">tiga</font><br>
    <font size="4">empat</font><br>
    <font size="5">lima</font><br>
    <font size="6">enam</font><br>
    <font size="7">tujuh</font><br>

    <br><br>

     Warna<br>

    <b>
        <font color="#FF0000">Red</font><br>
        <font color="#00FF00">Green</font><br>
        <font color="#0000FF">Blue</font><br>
        <font color="#FFFF00">Yellow</font><br>
        <font color="#FF00FF">Magenta</font><br>
        <font color="#00FFFF">Cyan</font><br>
        <font color="#000000">Black</font><br>
        <font color="#FFFFFF">White</font><br>
    </b>
    
    
    
    <p></p>
</body>
</html>
